services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: uptime-server-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/uptime.db
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://ping-agent.ru,https://www.ping-agent.ru,http://localhost:5173}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - HOST=0.0.0.0
      - PORT=3000
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - SERVER_ROLE=api
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENABLE_AGENT_API=${ENABLE_AGENT_API:-true}
      - AGENT_SSE_ENABLED=${AGENT_SSE_ENABLED:-true}
      - ENABLE_BUILTIN_WORKER=false
      - ALLOW_PRIVATE_MONITOR_TARGETS=${ALLOW_PRIVATE_MONITOR_TARGETS:-false}
    volumes:
      - db-data:/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/runtime').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: uptime-server-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/uptime.db
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_ROLE=worker
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - db-data:/data
    depends_on:
      - server

  retention:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: uptime-server-retention
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/uptime.db
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_ROLE=retention
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - db-data:/data
    depends_on:
      - server

  agent-offline-monitor:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: uptime-server-agent-offline
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/uptime.db
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_ROLE=agent-offline-monitor
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ENABLE_AGENT_API=${ENABLE_AGENT_API:-true}
    volumes:
      - db-data:/data
    depends_on:
      - server

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: uptime-client
    restart: unless-stopped
    environment:
      - SSL_DOMAINS=${SSL_DOMAINS:-ping-agent.ru,www.ping-agent.ru}
      - SSL_CERT_NAME=${SSL_CERT_NAME:-ping-agent.ru}
      - SSL_WATCH_INTERVAL_SEC=${SSL_WATCH_INTERVAL_SEC:-60}
      - ADMIN_ALLOWLIST=${ADMIN_ALLOWLIST:-}
      - AGENT_ALLOWLIST=${AGENT_ALLOWLIST:-}
      - RUNTIME_HEALTH_ALLOWLIST=${RUNTIME_HEALTH_ALLOWLIST:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    environment:
      - SSL_DOMAINS=${SSL_DOMAINS:-ping-agent.ru,www.ping-agent.ru}
      - SSL_CERT_NAME=${SSL_CERT_NAME:-ping-agent.ru}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - CERTBOT_STAGING=${CERTBOT_STAGING:-false}
      - CERTBOT_RENEW_INTERVAL_SEC=${CERTBOT_RENEW_INTERVAL_SEC:-43200}
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
      - ./scripts/certbot-entrypoint.sh:/usr/local/bin/certbot-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/certbot-entrypoint.sh"]

volumes:
  db-data:
  certbot-etc:
  certbot-var:
  webroot:
