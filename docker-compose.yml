services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: uptime-server
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/uptime.db
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - db-data:/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: uptime-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

  agent:
    build:
      context: .
      dockerfile: ./apps/agent/Dockerfile
    container_name: uptime-agent
    restart: unless-stopped
    environment:
      - MAIN_SERVER_URL=http://server:3000
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - AGENT_HTTP_TIMEOUT_MS=${AGENT_HTTP_TIMEOUT_MS:-7000}
      - AGENT_BUFFER_MAX=${AGENT_BUFFER_MAX:-200}
      - AGENT_RESULT_MAX_BATCH=${AGENT_RESULT_MAX_BATCH:-50}
      - AGENT_MAX_CONCURRENCY=${AGENT_MAX_CONCURRENCY:-6}
      - ENCRYPTION_KEY_1=${ENCRYPTION_KEY_1:-}
    mem_limit: 192m
    cpus: "0.25"
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:size=16m
    depends_on:
      - server

volumes:
  db-data:
