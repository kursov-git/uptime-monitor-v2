#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw

write_files:
  - path: /opt/uptime-agent/docker-compose.yml
    permissions: "0644"
    content: |
      services:
        uptime-agent:
          image: ${UPTIME_AGENT_IMAGE}
          container_name: uptime-agent
          restart: unless-stopped
          environment:
            MAIN_SERVER_URL: ${MAIN_SERVER_URL}
            AGENT_TOKEN: ${AGENT_TOKEN}
            ENCRYPTION_KEY_1: ${ENCRYPTION_KEY_1}
            AGENT_HTTP_TIMEOUT_MS: ${AGENT_HTTP_TIMEOUT_MS:-10000}
            AGENT_BUFFER_MAX: ${AGENT_BUFFER_MAX:-1000}
            AGENT_RESULT_MAX_BATCH: ${AGENT_RESULT_MAX_BATCH:-500}
            AGENT_MAX_CONCURRENCY: ${AGENT_MAX_CONCURRENCY:-6}
            ALLOW_PRIVATE_MONITOR_TARGETS: ${ALLOW_PRIVATE_MONITOR_TARGETS:-false}
          security_opt:
            - no-new-privileges:true
          cap_drop:
            - ALL
          read_only: true
          tmpfs:
            - /tmp:size=64m,noexec,nosuid,nodev
          pids_limit: 128
          mem_limit: 256m
          cpus: 0.50
  - path: /opt/uptime-agent/.env
    permissions: "0600"
    content: |
      # Replace placeholders before provisioning
      MAIN_SERVER_URL=__MAIN_SERVER_URL__
      AGENT_TOKEN=__AGENT_TOKEN__
      ENCRYPTION_KEY_1=__ENCRYPTION_KEY_1__
      UPTIME_AGENT_IMAGE=ghcr.io/kursov-git/uptime-agent:v2-latest
      AGENT_HTTP_TIMEOUT_MS=10000
      AGENT_BUFFER_MAX=1000
      AGENT_RESULT_MAX_BATCH=500
      AGENT_MAX_CONCURRENCY=6
      ALLOW_PRIVATE_MONITOR_TARGETS=false
  - path: /etc/systemd/system/uptime-agent.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Uptime Monitor Agent (Docker Compose)
      Wants=network-online.target docker.service
      After=network-online.target docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/uptime-agent
      ExecStart=/usr/bin/docker compose -f /opt/uptime-agent/docker-compose.yml --env-file /opt/uptime-agent/.env up -d
      ExecStop=/usr/bin/docker compose -f /opt/uptime-agent/docker-compose.yml --env-file /opt/uptime-agent/.env down
      ExecReload=/usr/bin/docker compose -f /opt/uptime-agent/docker-compose.yml --env-file /opt/uptime-agent/.env up -d
      TimeoutStartSec=120
      TimeoutStopSec=90

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - . /etc/os-release && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - ufw --force default deny incoming
  - ufw --force default allow outgoing
  - ufw allow OpenSSH
  - ufw --force enable
  - systemctl daemon-reload
  - systemctl enable uptime-agent
  - systemctl start uptime-agent
